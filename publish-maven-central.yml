name: Publish to Maven Central

# Triggers when you create a GitHub Release (e.g. tag v1.0.0)
on:
  release:
    types: [ published ]

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven
          # Writes ~/.m2/settings.xml with the 'central' server credentials
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      # Stamp the version from the Git tag (strips the leading 'v')
      # e.g. tag v1.2.3  →  version 1.2.3 in the POM
      - name: Set release version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Release version: $VERSION"
          mvn --batch-mode versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false

      - name: Build, sign & publish
        run: |
          mvn --batch-mode --no-transfer-progress \
              clean deploy \
              -P maven-central \
              -DskipTests
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      - name: Upload published artifacts
        uses: actions/upload-artifact@v4
        with:
          name: published-jars
          path: target/*.jar
